<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarihi Odunpazarı Kahvecisi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --kahve: #1a0e08;
    --altin: #b8922a;
    --altin-acik: #d4aa4a;
    --altin-soluk: #8a6820;
    --krem: #f5edd8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--kahve);
    color: var(--krem);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b8922a' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* HEADER */
  .header {
    width: 100%;
    position: relative;
  }
  .header-img-wrap {
    width: 100%;
    max-height: 310px;
    overflow: hidden;
  }
  .header-img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
    object-position: center center;
  }

  /* DIL BUTONU */
  .dil-buton-wrap {
    text-align: center;
    padding: 16px 0 8px;
  }
  .dil-buton {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 3px;
    background: transparent;
    border: 1px solid var(--altin-soluk);
    color: var(--altin-acik);
    padding: 8px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .dil-buton:hover {
    background: rgba(184,146,42,0.1);
    border-color: var(--altin);
    color: var(--altin);
  }
  .dil-buton .flag { margin-right: 6px; }

  /* MENU */
  #menu-container { padding: 10px 0 20px; }

  .kategori {
    max-width: 680px;
    margin: 0 auto 44px;
    padding: 0 20px;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .kategori.gorunen { opacity: 1; transform: translateY(0); }

  .kategori-baslik {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .kategori-baslik h2 {
    font-family: 'IM Fell English', serif;
    font-size: clamp(20px, 4.5vw, 28px);
    color: var(--altin);
    font-weight: 400;
    white-space: nowrap;
  }
  .kategori-cizgi {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--altin-soluk), transparent);
    opacity: 0.35;
  }

  .urun-listesi { border-top: 1px solid rgba(184,146,42,0.12); }
  .urun {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 6px;
    border-bottom: 1px solid rgba(184,146,42,0.07);
    gap: 10px;
    transition: background 0.2s;
  }
  .urun:hover { background: rgba(184,146,42,0.04); }
  .urun-adi {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 3.2vw, 19px);
    color: var(--krem);
    flex: 1;
  }
  .nokta-cizgisi {
    flex: 1;
    border-bottom: 1px dotted rgba(184,146,42,0.18);
    margin: 0 6px 4px;
    min-width: 16px;
  }
  .urun-fiyat {
    font-family: 'Cinzel', serif;
    font-size: clamp(13px, 2.8vw, 16px);
    color: var(--altin-acik);
    white-space: nowrap;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 32px 20px 44px;
    border-top: 1px solid rgba(184,146,42,0.12);
    max-width: 680px;
    margin: 0 auto;
  }
  .footer-logo {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--altin-soluk);
    margin-bottom: 10px;
  }
  .footer-adres {
    font-size: 13px;
    color: rgba(245,237,216,0.38);
    letter-spacing: 0.8px;
    line-height: 1.8;
  }
  .footer-tel {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--altin-soluk);
    letter-spacing: 2px;
    margin-top: 8px;
  }
</style>

  menuOlustur(null);
}

function csvParse(csv) {
  const satirlar = csv.trim().split('\n').map(s => s.split(',').map(h => h.trim()));
  const basliklar = satirlar[0];
  return satirlar.slice(1).map(satir => {
    const obj = {};
    basliklar.forEach((b, i) => obj[b] = satir[i] || '');
    return obj;
  });
}

function menuOlustur(csvVeri) {
  let kategoriler = MENU_DATA;

  // Sheets'ten gelen veri varsa fiyatları güncelle
  if (csvVeri) {
    const fiyatMap = {};
    csvVeri.forEach(r => { fiyatMap[r['urun_tr']] = r['fiyat']; });
    kategoriler = kategoriler.map(kat => ({
      ...kat,
      items: kat.items.map(u => ({
        ...u,
        fiyat: fiyatMap[u.tr] || u.fiyat
      }))
    }));
  }

  window._menuKategoriler = kategoriler;
  renderMenu();
}

function renderMenu() {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';
  const dil = mevcutDil;
  const kategoriler = window._menuKategoriler;

  kategoriler.forEach((kat, i) => {
    const div = document.createElement('div');
    div.className = 'kategori';
    div.innerHTML = `
      <div class="kategori-baslik">
        <h2>${dil === 'tr' ? kat.tr : kat.en}</h2>
        <div class="kategori-cizgi"></div>
      </div>
      <div class="urun-listesi">
        ${kat.items.map(u => `
          <div class="urun">
            <span class="urun-adi">${dil === 'tr' ? u.tr : u.en}</span>
            <div class="nokta-cizgisi"></div>
            <span class="urun-fiyat">${u.fiyat} ₺</span>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(div);
    setTimeout(() => div.classList.add('gorunen'), i * 80);
  });
}

function dilDegistir() {
  mevcutDil = mevcutDil === 'tr' ? 'en' : 'tr';
  document.getElementById('dil-label').textContent = mevcutDil === 'tr' ? 'English' : 'Türkçe';
  document.querySelector('.flag').textContent = mevcutDil === 'tr' ? '🇬🇧' : '🇹🇷';
  renderMenu();
}

menuYukle();
</script>
